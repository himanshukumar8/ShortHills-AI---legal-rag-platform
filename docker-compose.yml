version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: legal-rag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - API_HOST=http://localhost:8000
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: legal-rag-ui
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Inform the UI to connect to the internal API service name
      - API_HOST=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
